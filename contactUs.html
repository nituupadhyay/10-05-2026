<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
</head>
<body>
    <form method="post">
       FullName: <input type="text" id="name" name="name" required/><br>
       Company:  <input type="text" id="company"  name="company" required><br>
       Email: <input type="email" id="email"  name="email" required><br>
        Phone No : <input type="number"  id="number"  name="number" required><br>
        Address : <textarea rows="10" cols="20"  id="address"  name="address" required></textarea><br/>
        <button type="submit" value="submit">Submit</button>
    </form>
</body>
</html>
