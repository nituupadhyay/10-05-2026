<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form method="post" action="#">
        <label for name="name">UserName:</label>
        <input type="text" id="name" name="name" value="username" required/><br>

        <label name="password">Password:</label>
        <input type="password" id="password" name="password" value="password" required/><br>

        <label name="birthday">Birthday:</label>
        <input type="date" id="birthday" name="birthday" value='12-06-2000' required/><br>

        <p>Gender:</p>
        <input type="radio" id="male" name="gender" value="male">
        <label name="male">Male:</label>

        <input type="radio" id="female" name="gender" value="female" checked>
        <label name="female">Female:</label>

        <label for="cars">Choose a car:</label>
        <select id="cars" name="cars">
            <option value="volvo">Volvo</option>
            <option value="Saab">Saab</option>
            <option value="Fiat" selected>Fiat</option>
        </select>
    </form>
</body>
</html>
