<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent-container{
            position: relative;
            width: 150px;
            height: 150px;
            border: 2px solid black;
            background-color: aqua;
        }

        .right-aligned-div{
            position: absolute;
            width: 150px;
            height: 150px;
            background-color: greenyellow;
            right: 0;
            top: 0;
            left: 20%;
            bottom: 20%;
            color: white;
        }
    </style>
</head>
<body>
    <div class="parent-container">
    <div class="right-aligned-div">
      I am all the way on the right!
    </div>
  </div>
</body>
</html>
